name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check pyscf/ tests/

      - name: Type check with pyright
        run: |
          python -m venv /tmp/pyright-env
          /tmp/pyright-env/bin/pip install ".[dev]"
          /tmp/pyright-env/bin/pyright --pythonpath /tmp/pyright-env/bin/python

      - name: Run tests
        run: |
          coverage run -m pytest
          coverage xml
          coverage report --show-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docs]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/test-install
          /tmp/test-install/bin/pip install dist/*.whl
          /tmp/test-install/bin/python -c "from pyscf.ormas_ci import ORMASFCISolver; print('Import OK')"

  qdk-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with QDK extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,qdk]"

      - name: Run QDK integration tests
        run: pytest tests/test_qdk_integration.py tests/test_qdk_quantum_benchmarks.py -v

      - name: Smoke-test quantum benchmarks
        run: python benchmarks/bench_qdk_quantum.py --systems ethylene_dz
