site_name: ORMAS-CI
site_description: Occupation-Restricted Multiple Active Space CI solver for PySCF
site_url: https://brycewestheimer.github.io/ormas-ci
repo_url: https://github.com/brycewestheimer/ormas-ci
repo_name: brycewestheimer/ormas-ci

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Theory:
    - CASCI: theory/casci.md
    - RASCI: theory/rasci.md
    - ORMAS-CI: theory/ormas.md
    - GAS-CI: theory/gas.md
    - Method Comparison: theory/comparison.md
    - Slater-Condon Rules: theory/slater_condon.md
    - Quantum Computing: theory/quantum_computing.md
  - Architecture:
    - Module Overview: architecture/overview.md
    - Data Flow: architecture/data_flow.md
    - Bit String Representation: architecture/bitstrings.md
    - Integral Conventions: architecture/integrals.md
    - Determinant Enumeration: architecture/determinant_enumeration.md
    - Phase Factors: architecture/phase_factors.md
  - Design:
    - PySCF Integration: design/pyscf_integration.md
    - Differences from PySCF: design/pyscf_differences.md
    - QDK Integration: design/qdk_integration.md
    - Subspace Model: design/subspace_model.md
    - Performance: design/performance.md
    - Development Roadmap: design/future.md
  - Integration:
    - PySCF CASCI: integration/pyscf_casci.md
    - QDK Chemistry: integration/qdk_chemistry.md
    - Forte Comparison: integration/forte_comparison.md
  - API Reference:
    - Public API: api/public_api.md
    - Internal Modules: api/internals.md
  - Guides:
    - Getting Started: guides/getting_started.md
    - Choosing Subspaces: guides/choosing_subspaces.md
    - Common Recipes: guides/recipes.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
